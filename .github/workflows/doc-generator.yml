name: AI Doc Agent

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
        default: ollama
      caller_repository:
        required: false
        type: string
        default: ""
      caller_ref:
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
          ref: ${{ inputs.caller_ref != '' && inputs.caller_ref || github.ref }}
          fetch-depth: 0
          path: caller-repo

      - name: Get branch details
        id: vars
        shell: bash
        run: |
          BASE_BRANCH="${GITHUB_BASE_REF:-main}"
          if [ -n "${{ inputs.caller_ref }}" ]; then
            SOURCE_BRANCH="${{ inputs.caller_ref }}"
            SOURCE_BRANCH="${SOURCE_BRANCH#refs/heads/}"
          elif [ -z "$GITHUB_HEAD_REF" ]; then
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
          else
            SOURCE_BRANCH="${GITHUB_HEAD_REF}"
          fi

          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_BRANCH=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Resolve DocAgent source
        id: agent_source
        shell: bash
        run: |
          git clone https://github.com/meghanahprakash/mcp-ai-doc-agent.git ai-doc-agent
          AGENT_ROOT="ai-doc-agent"
          echo "Using cloned DocAgent source"

          echo "AGENT_ROOT=${AGENT_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Ensure download tools
        shell: bash
        run: |
          if command -v curl >/dev/null 2>&1 || command -v wget >/dev/null 2>&1; then
            echo "curl/wget already available"
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y curl ca-certificates
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache curl ca-certificates
          elif command -v yum >/dev/null 2>&1; then
            yum install -y curl ca-certificates
          else
            echo "Neither curl nor wget is available, and no supported package manager was found."
            exit 1
          fi

          if command -v update-ca-certificates >/dev/null 2>&1; then
            update-ca-certificates || true
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}/DocAgent
        shell: bash
        run: |
          cat > NuGet.Config << 'EOF'
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

          dotnet restore --tl:off --configfile NuGet.Config

      - name: Get changed files
        id: changes
        working-directory: caller-repo
        shell: bash
        run: |
          BASE_BRANCH="${{ steps.vars.outputs.BASE_BRANCH }}"
          export GIT_TERMINAL_PROMPT=0
          export GCM_INTERACTIVE=Never

          FETCH_OK=false
          if git ls-remote --exit-code --heads origin "${BASE_BRANCH}" >/dev/null 2>&1; then
            if git fetch --no-tags --depth=1 origin "${BASE_BRANCH}" >/dev/null 2>&1; then
              FETCH_OK=true
            fi
          fi

          if [ "${FETCH_OK}" = "true" ] && git rev-parse --verify "origin/${BASE_BRANCH}" >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only "origin/${BASE_BRANCH}...HEAD")"
          else
            echo "Remote base branch not available. Using local diff fallback."
            CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD || true)"
          fi

          echo "Changed files:"
          echo "${CHANGED_FILES}"

          echo "FILES<<EOF" >> "$GITHUB_OUTPUT"
          echo "${CHANGED_FILES}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Doc Agent
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}
        shell: bash
        run: |
          dotnet run --tl:off --no-restore \
            --project DocAgent/DocAgent.csproj -- \
            --repo "$GITHUB_WORKSPACE/caller-repo" \
            --provider "${{ inputs.provider }}" \
            --files "${{ steps.changes.outputs.FILES }}"

      - name: Create docs branch
        id: branch
        working-directory: caller-repo
        shell: bash
        run: |
          SOURCE_BRANCH="${{ steps.vars.outputs.SOURCE_BRANCH }}"
          SAFE_SOURCE_BRANCH="${SOURCE_BRANCH//\//-}"
          DOC_BRANCH="ai-docs/${SAFE_SOURCE_BRANCH}"

          echo "DOC_BRANCH=${DOC_BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B "${DOC_BRANCH}"

      - name: Copy docs
        shell: bash
        run: |
          mkdir -p caller-repo/docs
          cp -r "${{ steps.agent_source.outputs.AGENT_ROOT }}/docs/." caller-repo/docs/

      - name: Commit docs
        id: commit_docs
        working-directory: caller-repo
        shell: bash
        run: |
          git add docs/

          if git diff --cached --quiet; then
            echo "No doc changes"
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "AI-generated documentation update"
            git push -u origin "${{ steps.branch.outputs.DOC_BRANCH }}"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit_docs.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          path: caller-repo
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.DOC_BRANCH }}
          base: ${{ steps.vars.outputs.SOURCE_BRANCH }}
          title: AI Generated Docs for ${{ steps.vars.outputs.SOURCE_BRANCH }}
          body: |
            This PR contains automatically generated documentation.

            Generated by AI Doc Agent
            Based on latest changes