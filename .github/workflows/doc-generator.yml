name: AI Doc Agent

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
        default: ollama

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:

    # ✅ Checkout target repo (PR branch)
    - name: Checkout Caller Repo
      uses: actions/checkout@v4

    # ✅ Extract branch info
    - name: Get branch details
      id: vars
      run: |
        echo "BASE_BRANCH=${GITHUB_BASE_REF:-main}" >> $GITHUB_OUTPUT
        echo "SOURCE_BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" >> $GITHUB_OUTPUT

    # ✅ Clone MCP repo
    - name: Clone DocAgent
      run: |
        git clone https://github.com/<your-org>/ai-doc-agent.git

    # ✅ Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # ✅ Restore dependencies (isolated)
    - name: Restore Dependencies
      working-directory: ai-doc-agent/DocAgent
      run: |
        cat > NuGet.Config <<EOF
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          </packageSources>
        </configuration>
        EOF

        dotnet restore --configfile NuGet.Config

    # Get Changed files
    - name: Get changed files
      id: changes
      run: |
        git fetch origin ${{ github.base_ref }}

        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

        echo "Changed files:"
        echo "$CHANGED_FILES"

        echo "FILES<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    # ✅ Run MCP agent
    - name: Run Doc Agent
      working-directory: ai-doc-agent
      run: |      
        dotnet run --no-restore \
              --project DocAgent/DocAgent.csproj -- \
              --repo "$GITHUB_WORKSPACE" \
              --provider "${{ inputs.provider }}" \
              --files "${{ steps.changes.outputs.FILES }}"


    # ✅ Create docs branch
    - name: Create Docs Branch
      run: |
        DOC_BRANCH="ai-docs/${{ steps.vars.outputs.SOURCE_BRANCH }}"

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git checkout -b "$DOC_BRANCH"

    # ✅ Copy generated docs
    - name: Copy Docs
      run: |
        mkdir -p docs
        cp -r ai-doc-agent/docs/* docs/

    # ✅ Commit changes
    - name: Commit Docs
      run: |
        DOC_BRANCH="ai-docs/${{ steps.vars.outputs.SOURCE_BRANCH }}"

        git add docs/

        if git diff --cached --quiet; then
          echo "No doc changes"
          echo "NO_CHANGES=true" >> $GITHUB_ENV
        else
          git commit -m "🤖 AI-generated documentation update"
          git push origin "$DOC_BRANCH"
          echo "NO_CHANGES=false" >> $GITHUB_ENV
        fi

    # ✅ Create PR ONLY if changes exist
    - name: Create Pull Request
      if: env.NO_CHANGES == 'false'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: ai-docs/${{ steps.vars.outputs.SOURCE_BRANCH }}
        title: "🤖 AI Generated Docs for ${{ steps.vars.outputs.SOURCE_BRANCH }}"
        body: |
          This PR contains automatically generated documentation.

          ✅ Generated by AI Doc Agent  
          ✅ Based on latest changes  

        base: ${{ steps.vars.outputs.SOURCE_BRANCH }}