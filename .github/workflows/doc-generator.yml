name: AI Doc Agent

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
        default: smart
      caller_repository:
        required: false
        type: string
        default: ""
      caller_ref:
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN || github.token }}
          repository: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
          ref: ${{ inputs.caller_ref != '' && inputs.caller_ref || github.ref }}
          fetch-depth: 0
          path: caller-repo

      - name: Get branch details
        id: vars
        shell: bash
        run: |
          BASE_BRANCH="${GITHUB_BASE_REF:-${{ github.event.repository.default_branch || 'main' }}}"
          if [ -n "${{ inputs.caller_ref }}" ]; then
            SOURCE_BRANCH="${{ inputs.caller_ref }}"
            SOURCE_BRANCH="${SOURCE_BRANCH#refs/heads/}"
          elif [ -z "$GITHUB_HEAD_REF" ]; then
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
          else
            SOURCE_BRANCH="${GITHUB_HEAD_REF}"
          fi

          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_BRANCH=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Resolve target branch
        id: target
        working-directory: caller-repo
        shell: bash
        run: |
          SOURCE_BRANCH="${{ steps.vars.outputs.SOURCE_BRANCH }}"
          BASE_BRANCH="${{ steps.vars.outputs.BASE_BRANCH }}"

          if git show-ref --verify --quiet "refs/remotes/origin/${SOURCE_BRANCH}"; then
            TARGET_BRANCH="${SOURCE_BRANCH}"
          else
            TARGET_BRANCH="${BASE_BRANCH}"
          fi

          echo "TARGET_BRANCH=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Using target branch: ${TARGET_BRANCH}"

      - name: Checkout DocAgent source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN || github.token }}
          repository: meghanahprakash/mcp-ai-doc-agent
          ref: main
          fetch-depth: 1
          path: ai-doc-agent

      - name: Resolve DocAgent source
        id: agent_source
        shell: bash
        run: |
          AGENT_ROOT="ai-doc-agent"
          echo "Using checked out DocAgent source"
          echo "AGENT_ROOT=${AGENT_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Ensure download tools
        shell: bash
        run: |
          if command -v curl >/dev/null 2>&1 || command -v wget >/dev/null 2>&1; then
            echo "curl/wget already available"
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y curl ca-certificates
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache curl ca-certificates
          elif command -v yum >/dev/null 2>&1; then
            yum install -y curl ca-certificates
          else
            echo "Neither curl nor wget is available, and no supported package manager was found."
            exit 1
          fi

          if command -v update-ca-certificates >/dev/null 2>&1; then
            update-ca-certificates || true
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}/DocAgent
        shell: bash
        run: |
          cat > NuGet.Config << 'EOF'
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

          dotnet restore --tl:off --configfile NuGet.Config
                
      - name: Debug step
        working-directory: caller-repo
        run: |
          echo "STEP 1"
          pwd

          echo "STEP 2"
          ls -la

          echo "STEP 3"
          git status

          echo "STEP 4"
          git ls-files

          echo "STEP 5 DONE"

      - name: Get changed files
        id: changes
        working-directory: caller-repo
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha || '' }}"
          HEAD="${{ github.event.pull_request.head.sha || '' }}"

          if [ -z "$HEAD" ]; then
            HEAD=$(git rev-parse HEAD)
          fi

          if [ -z "$BASE" ] && [ -n "${{ github.event.before || '' }}" ]; then
            BASE="${{ github.event.before }}"
          fi

          echo "Base: ${BASE:-<none>}"
          echo "Head: $HEAD"

          if [ -n "$BASE" ] && git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            FILES=$(git diff --name-only "$BASE" "$HEAD")
          else
            FILES=$(git show --name-only --pretty="" "$HEAD")
          fi

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Doc Agent
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}
        shell: bash
        run: |
          dotnet run --tl:off --no-restore \
            --project DocAgent/DocAgent.csproj -- \
            --repo "$GITHUB_WORKSPACE/caller-repo" \
            --provider "${{ inputs.provider }}" \
            --files "${{ steps.changes.outputs.FILES }}" \
            --output-dir "$GITHUB_WORKSPACE/caller-repo/docs"

      - name: Create docs branch
        id: branch
        working-directory: caller-repo
        shell: bash
        run: |
          SOURCE_BRANCH="${{ steps.vars.outputs.SOURCE_BRANCH }}"
          TARGET_BRANCH="${{ steps.target.outputs.TARGET_BRANCH }}"
          SAFE_SOURCE_BRANCH="${SOURCE_BRANCH//\//-}"
          DOC_BRANCH="ai-docs/${SAFE_SOURCE_BRANCH}"

          echo "DOC_BRANCH=${DOC_BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B "${DOC_BRANCH}" "origin/${TARGET_BRANCH}"

      - name: Commit docs
        id: commit_docs
        working-directory: caller-repo
        shell: bash
        env:
          GH_PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          REPO_SLUG: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
        run: |
          git add docs/

          if git diff --cached --quiet; then
            echo "No doc changes"
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "skipped_push=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "AI-generated documentation update"

            if [ -z "${GH_PUSH_TOKEN}" ]; then
              echo "No GitHub token available. Skipping push step."
              echo "skipped_push=true" >> "$GITHUB_OUTPUT"
            else
              git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${REPO_SLUG}.git"
              GIT_TERMINAL_PROMPT=0 git push -u origin "${{ steps.branch.outputs.DOC_BRANCH }}"
              echo "skipped_push=false" >> "$GITHUB_OUTPUT"
            fi
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit_docs.outputs.no_changes == 'false' && steps.commit_docs.outputs.skipped_push != 'true'
        working-directory: caller-repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          REPO_SLUG: ${{ inputs.caller_repository != '' && inputs.caller_repository || github.repository }}
          DOC_BRANCH: ${{ steps.branch.outputs.DOC_BRANCH }}
          TARGET_BRANCH: ${{ steps.target.outputs.TARGET_BRANCH }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "No GitHub token available. Skipping PR creation."
            exit 0
          fi

          PR_TITLE="AI Generated Docs for ${TARGET_BRANCH}"
          PR_BODY=$(cat << 'EOF'
          This PR contains automatically generated documentation.

          Generated by AI Doc Agent
          Based on latest changes
          EOF
          )

          if command -v gh >/dev/null 2>&1; then
            EXISTING_PR=$(gh pr list \
              --head "${DOC_BRANCH}" \
              --base "${TARGET_BRANCH}" \
              --json number \
              --jq '.[0].number')

            if [ -n "${EXISTING_PR}" ] && [ "${EXISTING_PR}" != "null" ]; then
              echo "PR #${EXISTING_PR} already exists for ${DOC_BRANCH} -> ${TARGET_BRANCH}"
            else
              gh pr create \
                --head "${DOC_BRANCH}" \
                --base "${TARGET_BRANCH}" \
                --title "${PR_TITLE}" \
                --body "${PR_BODY}"
            fi
          else
            echo "GitHub CLI is not available. Falling back to GitHub REST API."

            API_URL="https://api.github.com/repos/${REPO_SLUG}/pulls"
            ESCAPED_TITLE=$(printf '%s' "${PR_TITLE}" | sed 's/"/\\"/g')
            ESCAPED_BODY=$(printf '%s' "${PR_BODY}" | sed ':a;N;$!ba;s/\n/\\n/g; s/"/\\"/g')
            JSON_PAYLOAD="{\"title\":\"${ESCAPED_TITLE}\",\"head\":\"${DOC_BRANCH}\",\"base\":\"${TARGET_BRANCH}\",\"body\":\"${ESCAPED_BODY}\"}"

            HTTP_CODE=$(curl -sS \
              -o /tmp/pr_response.json \
              -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              -X POST "${API_URL}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${JSON_PAYLOAD}")

            if [ "${HTTP_CODE}" = "201" ]; then
              echo "Pull request created via REST API."
            elif [ "${HTTP_CODE}" = "422" ] && grep -qi "already exists" /tmp/pr_response.json; then
              echo "A pull request already exists for ${DOC_BRANCH} -> ${TARGET_BRANCH}."
            else
              echo "Failed to create PR via REST API (HTTP ${HTTP_CODE})."
              cat /tmp/pr_response.json
              exit 1
            fi
          fi