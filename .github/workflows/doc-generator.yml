name: AI Doc Agent

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
        default: ollama

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch details
        id: vars
        shell: bash
        run: |
          BASE_BRANCH="${GITHUB_BASE_REF:-main}"
          if [ -z "$GITHUB_HEAD_REF" ]; then
            SOURCE_BRANCH="${GITHUB_REF_NAME}"
          else
            SOURCE_BRANCH="${GITHUB_HEAD_REF}"
          fi

          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_BRANCH=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Resolve DocAgent source
        id: agent_source
        shell: bash
        run: |
          if [ -d "DocAgent" ]; then
            AGENT_ROOT="."
            echo "Using local DocAgent source"
          else
            git clone https://github.com/meghanahprakash/mcp-ai-doc-agent.git ai-doc-agent
            AGENT_ROOT="ai-doc-agent"
            echo "Using cloned DocAgent source"
          fi

          echo "AGENT_ROOT=${AGENT_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}/DocAgent
        shell: bash
        run: |
          cat > NuGet.Config << 'EOF'
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

          dotnet restore --tl:off --configfile NuGet.Config

      - name: Get changed files
        id: changes
        shell: bash
        run: |
          BASE_BRANCH="${{ steps.vars.outputs.BASE_BRANCH }}"

          git fetch origin "${BASE_BRANCH}" --depth=1 || true

          if git rev-parse --verify "origin/${BASE_BRANCH}" >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only "origin/${BASE_BRANCH}...HEAD")"
          else
            CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD || true)"
          fi

          echo "Changed files:"
          echo "${CHANGED_FILES}"

          echo "FILES<<EOF" >> "$GITHUB_OUTPUT"
          echo "${CHANGED_FILES}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Doc Agent
        working-directory: ${{ steps.agent_source.outputs.AGENT_ROOT }}
        shell: bash
        run: |
          dotnet run --tl:off --no-restore \
            --project DocAgent/DocAgent.csproj -- \
            --repo "$GITHUB_WORKSPACE" \
            --provider "${{ inputs.provider }}" \
            --files "${{ steps.changes.outputs.FILES }}"

      - name: Create docs branch
        id: branch
        shell: bash
        run: |
          SOURCE_BRANCH="${{ steps.vars.outputs.SOURCE_BRANCH }}"
          SAFE_SOURCE_BRANCH="${SOURCE_BRANCH//\//-}"
          DOC_BRANCH="ai-docs/${SAFE_SOURCE_BRANCH}"

          echo "DOC_BRANCH=${DOC_BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B "${DOC_BRANCH}"

      - name: Copy docs
        shell: bash
        run: |
          mkdir -p docs
          cp -r "${{ steps.agent_source.outputs.AGENT_ROOT }}/docs/." docs/

      - name: Commit docs
        id: commit_docs
        shell: bash
        run: |
          git add docs/

          if git diff --cached --quiet; then
            echo "No doc changes"
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "AI-generated documentation update"
            git push -u origin "${{ steps.branch.outputs.DOC_BRANCH }}"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit_docs.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.DOC_BRANCH }}
          base: ${{ steps.vars.outputs.SOURCE_BRANCH }}
          title: AI Generated Docs for ${{ steps.vars.outputs.SOURCE_BRANCH }}
          body: |
            This PR contains automatically generated documentation.

            Generated by AI Doc Agent
            Based on latest changes